<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Exercicio 05</title>

<body>
    <header>
        <h1>Soma das <span>Linhas</span></h1>
        <p><strong>Objetivo:</strong> Calcular e mostrar a soma dos elementos de cada linha de uma matriz 3x4
            individualmente.</p>
        <p><strong>Como funciona:</strong> A variável de soma é reiniciada a cada iteração do laço externo para
            processar uma nova linha.</p>
    </header>
    <main>
        <div class="card">
            <div class="container-botao">
                <button onclick="calcular()">Clique aqui para iniciar o programa!</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
